<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAYBOOK — Chat with Layla</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* ── Multi-chat stage layout ── */
        body.client-page {
            align-items: flex-start;
            padding: 24px 16px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Top bar: logo + add-chat button */
        .chat-toolbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 500;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
        }

        .toolbar-logo {
            font-weight: 800;
            font-size: 1rem;
            color: var(--green);
            letter-spacing: 1.5px;
        }

        .add-chat-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: inherit;
        }

        .add-chat-btn:hover:not(:disabled) {
            background: var(--vibrant);
            border-color: transparent;
        }

        .add-chat-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Stage: horizontal scroll on mobile, flex-wrap on desktop */
        .chat-stage {
            display: flex;
            flex-direction: row;
            gap: 20px;
            align-items: flex-start;
            margin-top: 72px; /* below toolbar */
            padding-bottom: 32px;
            width: 100%;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .chat-stage::-webkit-scrollbar { height: 4px; }
        .chat-stage::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        /* Each chat window */
        .chat-stage .client-wrap {
            flex-shrink: 0;
            scroll-snap-align: start;
            width: 400px;
            height: 640px;
            max-height: calc(100vh - 96px);
        }

        /* Header actions area (new + close buttons) */
        .chat-header-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
        }

        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: #fff;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: inherit;
        }

        .new-chat-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .close-chat-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            line-height: 1;
        }

        .close-chat-btn:hover {
            background: rgba(239,68,68,0.5);
            border-color: transparent;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            body.client-page { padding: 0; }

            .chat-stage {
                margin-top: 56px;
                gap: 0;
                padding-bottom: 0;
            }

            .chat-stage .client-wrap {
                width: 100vw;
                height: calc(100vh - 56px);
                max-height: none;
                border-radius: 0;
            }

            .add-chat-btn span { display: none; }
        }

        @media (min-width: 481px) and (max-width: 900px) {
            .chat-stage .client-wrap {
                width: 360px;
            }
        }
    </style>
</head>
<body class="client-page">

    <!-- ── Top toolbar ── -->
    <div class="chat-toolbar">
        <div class="toolbar-logo">PLAYBOOK</div>
        <button class="add-chat-btn" id="addChatBtn" aria-label="Open another chat window">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
            <span>New Window</span>
        </button>
    </div>

    <div class="chat-stage" id="chatStage"></div>

    <script src="/js/app.js"></script>
    <script src="/js/theme.js"></script>
</body>
</html>
