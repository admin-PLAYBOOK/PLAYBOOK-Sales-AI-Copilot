<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAYBOOK — Chat with Layla</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body.client-page {
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            min-height: 100vh;
        }

        @media (max-width: 480px) {
            body.client-page {
                padding: 0;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body class="client-page">

    <div class="chat-shell">
        <!-- Tab bar: tab buttons + add button are injected here by JS -->
        <div class="tab-bar" id="tabBar" role="tablist" aria-label="Chat sessions">
            <!-- tab buttons injected by ChatManager -->
            <button class="add-tab-btn" id="addChatBtn" aria-label="Open a new chat tab" title="New chat tab">+</button>
        </div>

        <!-- Active chat panel is shown here -->
        <div id="panelWrap"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/theme.js"></script>
</body>
</html>
